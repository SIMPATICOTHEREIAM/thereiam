<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THEREIAM — The Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="thereiam-player.css" />
  <link rel="stylesheet" href="thereiam-ui.css" />
  <style>
    @font-face {
      font-family: 'Northpoint';
      src: url('North point.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #06050a;
      overflow-x: hidden;
    }

    /* ── very subtle grain over images — film quality ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 192px 192px;
      background-repeat: repeat;
      opacity: 0.028;
      pointer-events: none;
      z-index: 9000;
      animation: grain 1.2s steps(3) infinite;
    }

    @keyframes grain {
      0%   { background-position: 0 0; }
      33%  { background-position: 48px 22px; }
      66%  { background-position: -32px 52px; }
      100% { background-position: 22px -32px; }
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 22px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 500;
      background: linear-gradient(to bottom, rgba(6,5,10,0.88) 0%, transparent 100%);
    }

    .nav-home {
      font-family: 'Northpoint', monospace;
      font-size: 17px;
      letter-spacing: 0.07em;
      color: rgba(237,233,223,0.88);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
    }

    .nav-links a {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(237,233,223,0.22);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover  { color: rgba(237,233,223,0.75); }
    .nav-links a.active { color: rgba(237,233,223,0.75); }

    .nav-gear {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: rgba(237,233,223,0.22);
      opacity: 0.6;
      padding: 2px 4px;
      line-height: 1;
      transition: opacity 0.2s;
    }
    .nav-gear:hover { opacity: 1; }

    /* ════════════════════════════
       PHOTO SCROLL
    ════════════════════════════ */

    /* every image block */
    .frame {
      width: 100%;
      overflow: hidden;
      display: block;
      line-height: 0;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.93) contrast(1.04);
      transition: filter 0.6s ease;
    }

    /* height variants */
    .frame-full  { height: 100vh; }
    .frame-tall  { height: 85vh; }
    .frame-mid   { height: 65vh; }
    .frame-short { height: 44vh; }

    /* two images side by side */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    /* three images in a row */
    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
    }

    /* asymmetric split: wide + narrow */
    .row-asym {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 3px;
    }

    /* thin dark gap between rows */
    .gap { height: 3px; background: #06050a; }

    /* ── LOGO BREAK — wordmark floats between images ── */
    .logo-break {
      height: 52vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06050a;
    }

    .logo-break img {
      width: clamp(200px, 40vw, 500px);
      filter: invert(1) opacity(0.12);
      transition: filter 0.9s ease;
    }

    .logo-break:hover img {
      filter: invert(1) opacity(0.55);
    }

    /* ── SMILEY BREAK ── */
    .smile-break {
      height: 38vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06050a;
      overflow: hidden;
    }

    .smile-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      width: 100%;
      padding: 0 3vw;
      gap: 2vw;
    }

    .smile-row img {
      width: clamp(44px, 9vw, 110px);
      flex-shrink: 0;
      filter: invert(1) opacity(0.1);
      animation: slowSpin 22s linear infinite;
    }

    /* stagger each smile's spin speed so they feel alive */
    .smile-row img:nth-child(1) { animation-duration: 20s; }
    .smile-row img:nth-child(2) { animation-duration: 26s; animation-direction: reverse; }
    .smile-row img:nth-child(3) { animation-duration: 18s; }
    .smile-row img:nth-child(4) { animation-duration: 30s; animation-direction: reverse; }
    .smile-row img:nth-child(5) { animation-duration: 22s; }
    .smile-row img:nth-child(6) { animation-duration: 16s; animation-direction: reverse; }
    .smile-row img:nth-child(7) { animation-duration: 28s; }
    .smile-row img:nth-child(8) { animation-duration: 24s; animation-direction: reverse; }

    @keyframes slowSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── FOOTER ── */
    .brand-footer {
      padding: 44px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(237,233,223,0.05);
    }

    .footer-copy {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(237,233,223,0.18);
    }

    .footer-smiley {
      width: 26px;
      filter: invert(1) opacity(0.1);
      transition: filter 0.3s;
    }

    .footer-smiley:hover { filter: invert(1) opacity(0.4); }

    /* ── responsive ── */
    @media (max-width: 768px) {
      nav { padding: 18px 24px; }
      .nav-links { gap: 18px; }
      .row-2, .row-3, .row-asym { grid-template-columns: 1fr; }
      .frame-full { height: 75vh; }
      .frame-tall { height: 65vh; }
      .frame-mid  { height: 52vh; }
      .brand-footer { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="landing-preview.html" class="nav-home">THEREIAM</a>
    <div class="nav-links">
      <a href="landing-preview.html">Archive</a>
      <a href="page-hoodies.html">Hoodies</a>
      <a href="page-brand.html" class="active">The Brand</a>
      <a href="page-mystery.html">Origin</a>
      <a href="#" onclick="trOpenSubmit();return false;">Submit Your Work</a>
      <button class="nav-gear" onclick="openAdminModal()" title="Admin">⚙</button>
    </div>
  </nav>


  <!-- ════ PHOTO SCROLL — dynamically rendered from thereiam-content.js ════ -->
  <div id="photo-scroll"></div>


  <!-- FOOTER -->
  <footer class="brand-footer">
    <img class="footer-smiley" src="THEREIAM LOGOS/THEREIAM LOGO2.png" alt="" />
  </footer>

  <!-- ADMIN ACCESS MODAL -->
  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:8000;align-items:center;justify-content:center;">
    <div style="background:#09080d;border:1px solid rgba(237,233,223,0.08);padding:52px 44px;max-width:320px;width:90%;text-align:center;">
      <div style="font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.5em;text-transform:uppercase;color:rgba(237,233,223,0.18);margin-bottom:32px;">Admin Access</div>
      <input id="admin-pw-input" type="password" placeholder="· · · · · · · ·"
        style="width:100%;background:rgba(237,233,223,0.04);border:1px solid rgba(237,233,223,0.1);color:#ede9df;font-family:'Space Mono',monospace;font-size:14px;letter-spacing:0.3em;padding:13px 16px;text-align:center;outline:none;margin-bottom:10px;"
        onkeydown="if(event.key==='Enter') checkAdminPw()" />
      <div id="admin-pw-err" style="font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.2em;color:#b54a3a;height:16px;margin-bottom:12px;"></div>
      <button onclick="checkAdminPw()" style="width:100%;background:#2d6aad;border:none;color:#fff;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.4em;text-transform:uppercase;padding:13px;cursor:pointer;margin-bottom:10px;">Enter →</button>
      <button onclick="closeAdminModal()" style="background:none;border:none;color:rgba(237,233,223,0.2);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;padding:8px;">cancel</button>
    </div>
  </div>
  <script>
    function openAdminModal()  { const m=document.getElementById('admin-modal'); m.style.display='flex'; setTimeout(()=>document.getElementById('admin-pw-input').focus(),50); }
    function closeAdminModal() { document.getElementById('admin-modal').style.display='none'; document.getElementById('admin-pw-input').value=''; document.getElementById('admin-pw-err').textContent=''; }
    function checkAdminPw() {
      const pw = document.getElementById('admin-pw-input').value;
      const stored = localStorage.getItem('tr_admin_pw') || 'THEREIAM';
      if (pw === stored) { sessionStorage.setItem('tr_admin_ok','1'); window.location.href='admin.html'; }
      else { document.getElementById('admin-pw-err').textContent='wrong password'; document.getElementById('admin-pw-input').value=''; document.getElementById('admin-pw-input').focus(); }
    }
  </script>


  <!-- AUDIO PLAYER -->
  <div id="tr-player" class="tr-hidden">
    <div class="tr-left">
      <button class="tr-btn" onclick="trPrev()">←</button>
      <button class="tr-btn tr-play" id="tr-play" onclick="trToggle()">▶</button>
      <button class="tr-btn" onclick="trNext(false)">→</button>
      <div class="tr-progress-wrap" onclick="trSeek(event)" id="tr-bar">
        <div class="tr-progress-track">
          <div class="tr-progress-fill" id="tr-fill"></div>
        </div>
      </div>
    </div>
    <div class="tr-center">
      <span class="tr-track-name" id="tr-name">–</span>
      <span class="tr-sep">·</span>
      <span class="tr-track-artist" id="tr-artist">–</span>
    </div>
    <div class="tr-right">
      <span class="tr-time" id="tr-time">0:00</span>
      <button class="tr-btn tr-queue-btn" id="tr-queue-toggle" onclick="trToggleQueue()">☰</button>
    </div>
    <div id="tr-queue-panel"></div>
  </div>
  <script src="thereiam-content.js"></script>
  <script src="thereiam-media-db.js"></script>
  <script src="thereiam-player.js"></script>
  <script src="thereiam-submit.js"></script>
  <script>
    /* ── BRAND PAGE — Dynamic Photo Layout ──────────────────
       Reads from THEREIAM_CONTENT.brandPhotos and builds
       the editorial scroll automatically. Add/remove photos
       via admin.html — the layout adjusts seamlessly.
    ──────────────────────────────────────────────────────── */

    const SMILE_IMG = 'THEREIAM LOGOS/THEREIAM LOGO2.png';
    const LOGO_IMG  = 'THEREIAM LOGOS/THEREIAM LOGO1.png';

    function img(src) {
      return `<img src="${src}" alt="" loading="lazy" />`;
    }

    function smileRowHTML() {
      return `<div class="smile-break"><div class="smile-row">${Array(8).fill(`<img src="${SMILE_IMG}" alt="" />`).join('')}</div></div>`;
    }

    function logoBreakHTML() {
      return `<div class="logo-break"><img src="${LOGO_IMG}" alt="THEREIAM" /></div>`;
    }

    function gap() { return '<div class="gap"></div>'; }

    function slotHTML(s) {
      switch (s.type) {
        case 'full':
          return `<div class="frame frame-full">${img(s.srcs[0])}</div>${gap()}`;
        case 'final':
          return `<div class="frame frame-tall">${img(s.srcs[0])}</div>`;
        case 'pair':
          return `<div class="row-2">
            <div class="frame frame-tall">${img(s.srcs[0])}</div>
            <div class="frame frame-tall">${img(s.srcs[1])}</div>
          </div>${gap()}`;
        case 'triple':
          return `<div class="row-3">
            <div class="frame frame-mid">${img(s.srcs[0])}</div>
            <div class="frame frame-mid">${img(s.srcs[1])}</div>
            <div class="frame frame-mid">${img(s.srcs[2])}</div>
          </div>${gap()}`;
        case 'logo-break':
          return logoBreakHTML();
        case 'smile-row':
          return smileRowHTML();
        default:
          return '';
      }
    }

    function buildLayout(photos) {
      if (!photos || !photos.length) {
        return `<div style="height:60vh;display:flex;align-items:center;justify-content:center;
          color:rgba(232,228,220,0.12);font-family:'Space Mono',monospace;
          font-size:11px;letter-spacing:0.4em;text-transform:uppercase;">
          Photos loading
        </div>`;
      }

      /* ── assign photos to content slots ── */
      const slots = [];
      let i = 0, step = 0;

      while (i < photos.length) {
        const rem = photos.length - i;

        if (rem === 1) {
          slots.push({ type: 'full', srcs: [photos[i]] }); i++; step++;
        } else if (rem === 2) {
          slots.push({ type: 'pair', srcs: [photos[i], photos[i+1]] }); i+=2; step++;
        } else if (rem === 3) {
          slots.push({ type: 'triple', srcs: [photos[i], photos[i+1], photos[i+2]] }); i+=3; step++;
        } else {
          /* 4+ remaining — rotate pattern: full → pair → full → triple */
          const p = step % 4;
          if (p === 0 || p === 2) {
            slots.push({ type: 'full', srcs: [photos[i]] }); i++; step++;
          } else if (p === 1) {
            slots.push({ type: 'pair', srcs: [photos[i], photos[i+1]] }); i+=2; step++;
          } else {
            /* p===3 triple, but rem===4 → use pair to avoid a lone final photo */
            if (rem === 4) {
              slots.push({ type: 'pair', srcs: [photos[i], photos[i+1]] }); i+=2; step++;
            } else {
              slots.push({ type: 'triple', srcs: [photos[i], photos[i+1], photos[i+2]] }); i+=3; step++;
            }
          }
        }
      }

      const N = slots.length;

      /* ── inject logo-break and smile-row (high index first) ── */
      const smileIdx = N >= 6 ? Math.max(N - 3, Math.ceil(N / 3) + 2) : -1;
      const logoIdx  = N >= 4 ? Math.floor(N / 3) + 1 : -1;

      if (smileIdx > 0 && smileIdx <= N) {
        slots.splice(smileIdx, 0, { type: 'smile-row' });
      }
      if (logoIdx > 0 && logoIdx <= N) {
        slots.splice(logoIdx, 0, { type: 'logo-break' });
      }

      /* ── make last content slot a "final tall" (no trailing gap) ── */
      for (let k = slots.length - 1; k >= 0; k--) {
        if (slots[k].type === 'full') { slots[k].type = 'final'; break; }
        if (slots[k].type === 'pair' || slots[k].type === 'triple') break;
      }

      return slots.map(s => slotHTML(s)).join('\n');
    }

    /* ── render ── */
    document.getElementById('photo-scroll').innerHTML =
      buildLayout(THEREIAM_CONTENT.brandPhotos || []);
  </script>

</body>
</html>
